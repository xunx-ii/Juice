<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桔子笔记 · 管理后台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  header { border-bottom: 1px solid #21262d; padding-bottom: 1.5rem; margin-bottom: 2rem; }
  h1 { font-size: 1.5rem; color: #f97316; }
  .subtitle { color: #8b949e; font-size: 0.875rem; margin-top: 0.25rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 1.25rem; }
  .card h3 { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .card .value { font-size: 2rem; font-weight: 600; color: #f0f6fc; }
  .card .value.online { color: #3fb950; }
  .card .value.offline { color: #f85149; }
  .section { margin-bottom: 2rem; }
  .section h2 { font-size: 1rem; color: #f0f6fc; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #21262d; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
  th, td { padding: 0.75rem 1rem; text-align: left; font-size: 0.875rem; }
  th { background: #21262d; color: #8b949e; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; }
  td { border-top: 1px solid #21262d; }
  tr:hover td { background: #1c2128; }
  .empty { text-align: center; color: #484f58; padding: 2rem; }
  .badge { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 500; }
  .badge.online { background: #23863622; color: #3fb950; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .refresh { float: right; font-size: 0.8rem; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
  .refresh:hover { background: #30363d; }
  .error { color: #f85149; padding: 1rem; }
  footer { text-align: center; color: #484f58; font-size: 0.75rem; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #21262d; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🍊 桔子笔记 · 管理后台</h1>
    <p class="subtitle" id="subtitle">加载中…</p>
  </header>

  <div id="error-area"></div>

  <div class="grid" id="stats-grid">
    <div class="card"><h3>文件夹总数</h3><div class="value" id="folder-count">—</div></div>
    <div class="card"><h3>笔记总数</h3><div class="value" id="note-count">—</div></div>
    <div class="card"><h3>注册用户</h3><div class="value" id="user-count">—</div></div>
    <div class="card"><h3>在线连接</h3><div class="value online" id="ws-count">—</div></div>
    <div class="card"><h3>运行时间</h3><div class="value" id="uptime">—</div></div>
  </div>

  <div class="section">
    <h2>
      WebSocket 在线客户端
      <button id="refresh-button" class="refresh">刷新</button>
    </h2>
    <table>
      <thead><tr><th>用户</th><th>连接时间</th></tr></thead>
      <tbody id="ws-tbody"><tr><td colspan="2" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <h2>注册用户
      <button id="register-toggle-button" class="refresh">+ 新建</button>
    </h2>
    <div id="register-form" style="display:none; margin-top:1rem;">
      <div style="display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <label style="display:block; font-size:0.75rem; color:#8b949e; margin-bottom:0.3rem;">用户名</label>
          <input id="reg-username" type="text" placeholder="输入用户名" style="background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:0.45rem 0.7rem; border-radius:6px; font-size:0.875rem; width:180px;">
        </div>
        <div>
          <label style="display:block; font-size:0.75rem; color:#8b949e; margin-bottom:0.3rem;">密码</label>
          <input id="reg-password" type="password" placeholder="输入密码" style="background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:0.45rem 0.7rem; border-radius:6px; font-size:0.875rem; width:180px;">
        </div>
        <button id="register-submit-button" style="background:#238636; border:none; color:#fff; padding:0.45rem 0.9rem; border-radius:6px; font-size:0.8rem; cursor:pointer;">注册</button>
      </div>
      <div id="register-msg" style="margin-top:0.6rem; font-size:0.8rem;"></div>
    </div>
  </div>

  <div class="section">
    <h2>用户列表</h2>
    <table>
      <thead><tr><th>序号</th><th>用户名</th><th style="text-align:right;">操作</th></tr></thead>
      <tbody id="user-tbody"><tr><td colspan="3" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>

  <footer>桔子笔记 Server v<span id="version">—</span></footer>
</div>

<!-- Token login modal -->
<div id="token-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; padding:2rem; max-width:360px; width:90%;">
    <h2 style="color:#f0f6fc; font-size:1.1rem; margin-bottom:0.5rem;">🔐 管理员验证</h2>
    <p style="color:#8b949e; font-size:0.8rem; margin-bottom:1.25rem;">请输入管理令牌（ADMIN_TOKEN）以访问后台</p>
    <input id="token-input" type="password" placeholder="管理令牌" style="width:100%; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:0.6rem 0.8rem; border-radius:6px; font-size:0.875rem; margin-bottom:1rem; box-sizing:border-box;">
    <button id="token-submit-button" style="width:100%; background:#238636; border:none; color:#fff; padding:0.55rem; border-radius:6px; font-size:0.875rem; cursor:pointer;">登录</button>
    <div id="token-error" style="margin-top:0.6rem; font-size:0.8rem; color:#f85149;"></div>
  </div>
</div>

<script>
// Token management
function getToken() { return localStorage.getItem('admin_token') || ''; }
function setToken(t) { localStorage.setItem('admin_token', t); }
function el(id) { return document.getElementById(id); }
function clearChildren(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}
function appendTextCell(row, text) {
  const td = document.createElement('td');
  td.textContent = text;
  row.appendChild(td);
  return td;
}
function renderTableMessage(tbody, colspan, message) {
  clearChildren(tbody);
  const row = document.createElement('tr');
  const cell = document.createElement('td');
  cell.colSpan = colspan;
  cell.className = 'empty';
  cell.textContent = message;
  row.appendChild(cell);
  tbody.appendChild(row);
}
function setInlineMessage(node, message, color) {
  node.textContent = message;
  node.style.color = color;
}

async function fetchJSON(path) {
  const token = getToken();
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(path, { headers });
  if (r.status === 401) {
    // Token missing or invalid — show the login modal.
    el('token-modal').style.display = 'flex';
    throw new Error('未授权：请提供有效的管理令牌');
  }
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function submitToken() {
  const t = el('token-input').value.trim();
  if (!t) return;
  setToken(t);
  el('token-modal').style.display = 'none';
  el('token-error').textContent = '';
  loadAll();
}

function fmtUptime(sec) {
  const d = Math.floor(sec / 86400), h = Math.floor((sec % 86400) / 3600), m = Math.floor((sec % 3600) / 60);
  if (d > 0) return `${d}天${h}时`;
  if (h > 0) return `${h}小时${m}分`;
  return `${m}分钟`;
}

function showError(msg) {
  const area = el('error-area');
  clearChildren(area);
  const box = document.createElement('div');
  box.className = 'error';
  box.textContent = `⚠️ ${msg}`;
  area.appendChild(box);
}
function clearError() {
  clearChildren(el('error-area'));
}

async function loadStats() {
  try {
    const info = await fetchJSON('/api/admin/systeminfo');
    el('folder-count').textContent = info.folder_count ?? 0;
    el('note-count').textContent = info.note_count ?? 0;
    el('user-count').textContent = info.user_count ?? 0;
    el('ws-count').textContent = info.active_ws_clients ?? 0;
    el('uptime').textContent = fmtUptime(info.uptime_seconds ?? 0);
    el('version').textContent = info.version ?? '—';
    const startDate = new Date(Date.now() - (info.uptime_seconds ?? 0) * 1000);
    el('subtitle').textContent = `服务自 ${startDate.toLocaleString('zh-CN')} 运行中`;
    clearError();
  } catch (e) {
    showError(`系统信息加载失败: ${e.message}`);
  }
}

async function loadClients() {
  try {
    const data = await fetchJSON('/api/admin/ws_clients');
    const clients = data.clients ?? [];
    const tbody = el('ws-tbody');
    if (clients.length === 0) {
      renderTableMessage(tbody, 2, '当前没有客户端连接');
    } else {
      clearChildren(tbody);
      clients.forEach(c => {
        const row = document.createElement('tr');
        const userCell = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'badge online';
        const dot = document.createElement('span');
        dot.className = 'dot';
        badge.appendChild(dot);
        badge.appendChild(document.createTextNode(c.username || '未知'));
        userCell.appendChild(badge);
        row.appendChild(userCell);
        appendTextCell(row, c.connected_at || '—');
        tbody.appendChild(row);
      });
    }
  } catch (e) {
    renderTableMessage(el('ws-tbody'), 2, `加载失败: ${e.message}`);
  }
}

async function loadUsers() {
  try {
    const data = await fetchJSON('/api/admin/users?page=1&page_size=50');
    const users = data.users ?? [];
    const tbody = el('user-tbody');
    if (users.length === 0) {
      renderTableMessage(tbody, 3, '暂无注册用户');
    } else {
      const start = (data.pager?.page - 1) * data.pager?.page_size || 0;
      clearChildren(tbody);
      users.forEach((u, i) => {
        const row = document.createElement('tr');
        appendTextCell(row, String(start + i + 1));
        appendTextCell(row, u.username);
        const actionCell = document.createElement('td');
        actionCell.style.textAlign = 'right';
        const button = document.createElement('button');
        button.textContent = '删除';
        button.style.cssText = 'background:none; border:1px solid #f8514944; color:#f85149; padding:0.2rem 0.5rem; border-radius:4px; font-size:0.7rem; cursor:pointer;';
        button.addEventListener('click', () => deleteUser(u.username));
        actionCell.appendChild(button);
        row.appendChild(actionCell);
        tbody.appendChild(row);
      });
    }
  } catch (e) {
    renderTableMessage(el('user-tbody'), 3, `加载失败: ${e.message}`);
  }
}

async function deleteUser(username) {
  if (!confirm(`确定要删除用户 '${username}' 吗？\n此操作将同时删除该用户的所有笔记，不可恢复。`)) return;
  const token = getToken();
  try {
    const r = await fetch(`/api/admin/users/${encodeURIComponent(username)}`, {
      method: 'DELETE',
      headers: token ? { 'Authorization': 'Bearer ' + token } : {},
    });
    const data = await r.json();
    if (data.success) {
      loadUsers();
      loadStats();
    } else {
      alert('删除失败: ' + data.message);
    }
  } catch (e) {
    alert('请求失败: ' + e.message);
  }
}

function toggleRegister() {
  const form = el('register-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function doRegister() {
  const username = el('reg-username').value.trim();
  const password = el('reg-password').value;
  const msgEl = el('register-msg');

  if (!username || !password) {
    setInlineMessage(msgEl, '请填写用户名和密码', '#f85149');
    return;
  }

  setInlineMessage(msgEl, '注册中…', '#8b949e');

  try {
    const r = await fetch('/api/admin/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (data.success) {
      setInlineMessage(msgEl, `✓ ${data.message}`, '#3fb950');
      el('reg-username').value = '';
      el('reg-password').value = '';
      loadUsers();
      loadStats();
    } else {
      setInlineMessage(msgEl, `✗ ${data.message}`, '#f85149');
    }
  } catch (e) {
    setInlineMessage(msgEl, `请求失败: ${e.message}`, '#f85149');
  }
}

async function loadAll() {
  await Promise.all([loadStats(), loadClients(), loadUsers()]);
}

// If no saved token, show modal on first load.
if (!getToken()) {
  el('token-modal').style.display = 'flex';
} else {
  loadAll();
  setInterval(loadAll, 15000);
}
el('refresh-button').addEventListener('click', loadAll);
el('register-toggle-button').addEventListener('click', toggleRegister);
el('register-submit-button').addEventListener('click', doRegister);
el('token-submit-button').addEventListener('click', submitToken);
el('token-input').addEventListener('keydown', event => {
  if (event.key === 'Enter') submitToken();
});
</script>
</body>
</html>
